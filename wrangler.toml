# Cloudflare Pages configuration
# CF Pages Functions in functions/ handle frontend proxies (/{slug}/*) and
# API proxies (api/[[path]].ts for Hub, api/{slug}/[[path]].ts per project).
# Auth session check in _middleware.ts; OIDC token generation in _lib/gcp-auth.ts.

name = "dc-hub"
pages_build_output_dir = "dist"
compatibility_date = "2024-01-01"
