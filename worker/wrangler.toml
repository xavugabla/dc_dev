name = "dc-hub-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# KV for auth: pending requests, approved users, magic link tokens, sessions
kv_namespaces = [
  { binding = "AUTH", id = "925291dbfa924a748a51ad7d2cf63ea5" }
]

# Env vars (set in Cloudflare dashboard or via wrangler secret)
# ADMIN_SECRET - required to access /admin and approve requests
# HUB_ORIGIN - e.g. https://dc-dev-hub.pages.dev
# MODELING_ORIGIN - e.g. https://dc-modeling.pages.dev (optional, for /modeling/* routing)
# PIPELINE_ORIGIN - dc_async Cloud Run URL (optional, for /pipeline/* routing)
#   Set via: npx wrangler secret put PIPELINE_ORIGIN
# PARTNER_PORTAL_ORIGIN - CF Pages URL for partner portal frontend
# PARTNER_API_ORIGIN - Cloud Run URL for partner portal API
#   Set via: npx wrangler secret put PARTNER_API_ORIGIN

[vars]
HUB_ORIGIN = "https://dc-hub.pages.dev"
MODELING_ORIGIN = "https://dc-modeling.pages.dev"
MODELING_API_ORIGIN = "https://one-click-dc-api-216566158850.us-central1.run.app"
NOTION_SYNC_ORIGIN = "https://notion-sync-7ja.pages.dev"
NOTION_SYNC_API_ORIGIN = "https://dc-async-api-216566158850.us-central1.run.app"
PARTNER_PORTAL_ORIGIN = "https://dc-partner-portal.pages.dev"
PARTNER_API_ORIGIN = "https://partner-portal-api.us-central1.run.app"
